<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-light); font-family: var(--font-body); }
  .lbl { font-size: 12px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, ServiceCard } = window.PetLoveCareDesignSystem_7829c3;
    function Demo() {
      return (
        <div>
          <p className="lbl">Surface card</p>
          <Card style={{ maxWidth: '320px', marginBottom: '24px' }}>
            <h3 style={{ margin: '0 0 6px', fontFamily: 'var(--font-display)', color: 'var(--navy)' }}>Rex</h3>
            <p style={{ margin: 0, color: 'var(--muted)' }}>Cachorro · Golden Retriever · 3 anos</p>
          </Card>
          <p className="lbl">Service cards</p>
          <div className="cols">
            <ServiceCard title="TOSA">Nossa tosa é realizada com atenção aos detalhes e foco total no conforto e bem-estar do seu pet.</ServiceCard>
            <ServiceCard title="BANHO">O banho é feito com produtos adequados e técnicas de higiene para garantir limpeza e segurança.</ServiceCard>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
