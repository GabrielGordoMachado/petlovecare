<!-- @dsCard group="Components" viewport="700x340" name="Feedback — Rating & Cards" subtitle="Gold star ratings and admin feedback tiles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-light); font-family: var(--font-body); }
  .lbl { font-size: 12px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; }
  .row { display: flex; gap: 18px; align-items: center; margin-bottom: 22px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { RatingStars, FeedbackCard } = window.PetLoveCareDesignSystem_7829c3;
    function Demo() {
      return (
        <div>
          <p className="lbl">Rating stars</p>
          <div className="row">
            <RatingStars value={5} /><RatingStars value={4} /><RatingStars value={3} /><RatingStars value={1} />
          </div>
          <p className="lbl">Feedback cards</p>
          <div className="cards">
            <FeedbackCard name="Ana Souza" rating={5} comment="Atendimento maravilhoso, meu cão saiu lindo da tosa!" response="Obrigado, Ana! Volte sempre 🐾" />
            <FeedbackCard name="Carlos M." rating={4} comment="Muito bom o banho, só demorou um pouco para começar." />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
