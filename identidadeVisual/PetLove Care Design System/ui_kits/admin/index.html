<!-- @startingPoint section="Admin" subtitle="PetLove Care admin desktop shell" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PetLove Care — Admin</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: var(--bg-light); font-family: var(--font-body); }
  @keyframes splashIn { from { opacity: 0; transform: scale(0.94) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    function App() {
      // stage ∈ 'splash' | 'login' | 'app'
      const [stage, setStage] = useState('splash');
      const [tab, setTab] = useState('agendamentos');
      useEffect(() => {
        if (stage === 'splash') {
          const t = setTimeout(() => setStage('login'), 2200);
          return () => clearTimeout(t);
        }
      }, [stage]);

      if (stage === 'splash') return <Splash />;
      if (stage === 'login') return <AdminLogin onEnter={() => setStage('app')} />;

      const View = { agendamentos: Agendamentos, servicos: Servicos, feedbacks: Feedbacks }[tab];
      return (
        <div style={{ display: 'flex', height: '100%' }}>
          <Sidebar active={tab} onSelect={setTab} adminName="Gabriel" onLogout={() => setStage('login')} />
          <main style={{ flex: 1, padding: '28px 36px', overflow: 'auto', background: 'var(--bg-light)' }}>
            <View />
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
