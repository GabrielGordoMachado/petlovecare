<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & shadow" subtitle="Corner radii and elevation" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-light); font-family:var(--font-body); }
  .row { display:flex; gap:26px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; align-items:center; gap:9px; }
  .box { width:74px; height:60px; background:#fff; border:1px solid var(--line); }
  .t { font-size:11px; color:var(--muted); font-weight:700; text-align:center; }
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="t">radius-sm · 8</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius)"></div><div class="t">radius · 12</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="t">radius-lg · 18</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill);width:110px"></div><div class="t">pill · 999</div></div>
    <div class="col"><div class="box" style="border:none;box-shadow:var(--shadow-sm);border-radius:12px"></div><div class="t">shadow-sm</div></div>
    <div class="col"><div class="box" style="border:none;box-shadow:var(--shadow);border-radius:12px"></div><div class="t">shadow</div></div>
  </div>
</body></html>
