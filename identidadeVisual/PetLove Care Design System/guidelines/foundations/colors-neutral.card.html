<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:18px; background:#fff; font-family:var(--font-body); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; }
  .chip { height:64px; border-radius:10px; border:1px solid var(--line); }
  .nm { font-size:13px; font-weight:800; color:var(--navy); margin:8px 0 1px; }
  .hex { font-size:12px; color:var(--muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--white)"></div><div class="nm">White</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-light)"></div><div class="nm">BG light</div><div class="hex">#F8FAFC</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="nm">Surface</div><div class="hex">#F5F5F5</div></div>
    <div class="sw"><div class="chip" style="background:var(--input)"></div><div class="nm">Input fill</div><div class="hex">#D9D9D9</div></div>
    <div class="sw"><div class="chip" style="background:var(--line)"></div><div class="nm">Line</div><div class="hex">#E2E8F0</div></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="nm">Muted</div><div class="hex">#64748B</div></div>
  </div>
</body></html>
