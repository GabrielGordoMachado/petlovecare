<!-- @dsCard group="Colors" viewport="700x150" name="Brand palette" subtitle="Navy, coral, teal — the core identity" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:18px; background:#fff; font-family:var(--font-body); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; }
  .chip { height:64px; border-radius:10px; border:1px solid rgba(0,0,0,.06); }
  .nm { font-size:13px; font-weight:800; color:var(--navy); margin:8px 0 1px; }
  .hex { font-size:12px; color:var(--muted); font-family:var(--font-body); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy)"></div><div class="nm">Navy</div><div class="hex">#1E293B</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-deep)"></div><div class="nm">Navy deep</div><div class="hex">#162032</div></div>
    <div class="sw"><div class="chip" style="background:var(--coral)"></div><div class="nm">Coral</div><div class="hex">#FF7F50</div></div>
    <div class="sw"><div class="chip" style="background:var(--coral-dark)"></div><div class="nm">Coral dark</div><div class="hex">#ED6A3A</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal)"></div><div class="nm">Teal</div><div class="hex">#2C6E8F</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-bright)"></div><div class="nm">Teal bright</div><div class="hex">#2EC4B6</div></div>
  </div>
</body></html>
