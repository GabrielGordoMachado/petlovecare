<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:20px 22px; background:#fff; font-family:var(--font-body); color:var(--text); }
  .lead { font-size:18px; font-weight:700; }
  .p { font-size:16px; line-height:1.5; max-width:560px; margin-top:8px; }
  .lbl { font-size:13px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:12px; }
  .meta { color:var(--muted); font-size:12px; margin-top:10px; }
</style></head>
<body>
  <div class="lead">Cuidado em cada momento para seu pet.</div>
  <div class="p">Unimos organização e atendimento humanizado para oferecer experiências seguras e acolhedoras. Cada animal merece atenção especial.</div>
  <div class="lbl">CPF</div>
  <div class="meta">Nunito · 800 / 700 / 600 / 400 · line-height 1.5</div>
</body></html>
