<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4pt base — 4 to 64px" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:22px; background:#fff; font-family:var(--font-body); }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background:var(--coral); border-radius:4px; }
  .t { font-size:11px; color:var(--muted); font-weight:700; }
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="width:4px;height:4px"></div><div class="t">1 · 4</div></div>
    <div class="col"><div class="box" style="width:8px;height:8px"></div><div class="t">2 · 8</div></div>
    <div class="col"><div class="box" style="width:12px;height:12px"></div><div class="t">3 · 12</div></div>
    <div class="col"><div class="box" style="width:16px;height:16px"></div><div class="t">4 · 16</div></div>
    <div class="col"><div class="box" style="width:24px;height:24px"></div><div class="t">5 · 24</div></div>
    <div class="col"><div class="box" style="width:32px;height:32px"></div><div class="t">6 · 32</div></div>
    <div class="col"><div class="box" style="width:48px;height:48px"></div><div class="t">7 · 48</div></div>
    <div class="col"><div class="box" style="width:64px;height:64px"></div><div class="t">8 · 64</div></div>
  </div>
</body></html>
