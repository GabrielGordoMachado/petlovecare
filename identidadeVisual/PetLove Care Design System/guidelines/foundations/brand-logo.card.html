<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:20px; background:#fff; font-family:var(--font-body); display:flex; gap:16px; }
  .panel { flex:1; height:188px; border-radius:14px; display:grid; place-items:center; }
  .panel img { height:120px; width:auto; }
  .light { background:var(--bg-light); border:1px solid var(--line); }
  .navy { background:var(--navy); }
  .coral { background:var(--coral); }
</style></head>
<body>
  <div class="panel light"><img src="../../assets/logo-lockup.png" alt="PetLove Care" /></div>
  <div class="panel navy"><img src="../../assets/logo-lockup-white.png" alt="PetLove Care" /></div>
  <div class="panel coral"><img src="../../assets/logo-mark-white.png" alt="PetLove Care mark" style="height:130px" /></div>
</body></html>
