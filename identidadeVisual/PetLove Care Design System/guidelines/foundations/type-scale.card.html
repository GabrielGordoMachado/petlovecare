<!-- @dsCard group="Type" viewport="700x190" name="Type scale" subtitle="Sizes from caption to hero" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:18px 22px; background:#fff; font-family:var(--font-display); color:var(--navy); }
  .r { display:flex; align-items:baseline; gap:14px; margin:6px 0; }
  .r b { font-weight:700; }
  .t { font-family:var(--font-body); color:var(--muted); font-size:11px; width:96px; flex-shrink:0; }
</style></head>
<body>
  <div class="r"><span class="t">128 · display</span><b style="font-size:40px">Hero</b></div>
  <div class="r"><span class="t">44 · h1</span><b style="font-size:30px">Section</b></div>
  <div class="r"><span class="t">32 · h2</span><b style="font-size:26px">Modal title</b></div>
  <div class="r"><span class="t">22 · title</span><b style="font-size:20px">Card title</b></div>
  <div class="r"><span class="t">16 · body</span><b style="font-size:16px;font-family:var(--font-body);font-weight:400">Body text</b></div>
  <div class="r"><span class="t">14 · small</span><b style="font-size:14px;font-family:var(--font-body);font-weight:600">Label / nav</b></div>
</body></html>
